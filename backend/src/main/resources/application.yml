server:
  port: 8090

spring:
  application:
    name: backend
  datasource:
    url: jdbc:postgresql://localhost:5432/splashcan
    username: splashcan
    password: splashcan
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
  cache:
    type: simple   # in-memory for local dev/test; set SPRING_CACHE_TYPE=redis (+ SPRING_DATA_REDIS_HOST/PORT) to use Redis

management:
  endpoints:
    web:
      exposure:
        include: health
  health:
    redis:
      enabled: false   # no Redis on local dev; docker-compose re-enables via MANAGEMENT_HEALTH_REDIS_ENABLED

app:
  jwt:
    secret: ${JWT_SECRET:NFy4tqcu7GunlxYq3lPjBis47KkVXvGQqzB5SnNy6DVJjAXxOExINKtQHXHflGzM}
    access-token-expiration-minutes: 15
    refresh-token-expiration-days: 7
